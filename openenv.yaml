version: "1.0"
name: "smart_grid_env"
description: "Cyber-Physical Energy Simulation. The agent manages a city micro-grid, balancing solar generation, battery storage, and market prices to prevent blackouts."

tasks:
  - id: "easy_battery_charge"
    name: "Surplus Storage"
    description: "Charge the battery using the noon solar surplus."
    difficulty: "easy"
    grader: "server.smart_grid_env_environment:easy_grader"
  
  - id: "medium_peak_shaving"
    name: "Peak Shaving"
    description: "Discharge the battery to cover the 6 PM load spike."
    difficulty: "medium"
    grader: "server.smart_grid_env_environment:medium_grader"
  
  - id: "hard_storm_survival"
    name: "Survive the Storm"
    description: "Manage grid purchases to survive the night without going bankrupt."
    difficulty: "hard"
    grader: "server.smart_grid_env_environment:hard_grader"

