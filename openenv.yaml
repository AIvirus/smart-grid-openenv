spec_version: 1
name: smart_grid_env
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "Cyber-Physical Energy Simulation. The agent manages a city micro-grid, balancing solar generation, battery storage, and market prices to prevent blackouts."

tasks:
  - name: easy_surplus
    description: "Surplus Storage: Identify a noon solar surplus and charge the battery."
    grader: graders:easy_grader

  - name: medium_peak
    description: "Peak Shaving: Discharge the battery to cover a 6 PM demand spike."
    grader: graders:medium_grader

  - name: hard_storm_survival
    description: "Survive the Storm: Build a battery reserve and survive a severe evening storm."
    grader: graders:hard_grader

